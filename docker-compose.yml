services:

  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: capital_bri
      POSTGRES_PASSWORD: capital_bri_dev
      POSTGRES_DB: capital_bri
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/10_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capital_bri -d capital_bri"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://capital_bri:capital_bri_dev@db:5432/capital_bri
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
